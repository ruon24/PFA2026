services:
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:master
    container_name: livekit-dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    command:
      - --dev
      - --bind
      - 0.0.0.0
      - --node-ip
      - 127.0.0.1
    restart: unless-stopped

volumes:
  chroma_data:
